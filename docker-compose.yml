version: '3.8'
services:
  web:
    build: .
    container_name: plantes-shop
    ports:
      - "8080:80"
    restart: unless-stopped

  logs-viewer:
    image: httpd:alpine
    container_name: plantes-shop-logs
    ports:
      - "8081:80"
    volumes:
      - ./logs:/usr/local/apache2/htdocs
    restart: unless-stopped
